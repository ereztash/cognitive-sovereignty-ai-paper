name: Deploy site to GitHub Pages

# REQUIRED one-time setup (cannot be done from CI -- the GITHUB_TOKEN is not
# allowed to create a Pages site): repo Settings -> Pages -> Build and deployment
# -> Source = "GitHub Actions".
#
# This workflow is MANUAL ON PURPOSE. Until Pages is enabled, an automatic run
# could only fail (configure-pages cannot create the site), so it does not run on
# push and never reports a red build. After enabling Pages, publish by clicking
# "Run workflow" on the Actions tab. To switch back to auto-deploy on main, add
# this under "on:" :
#     push:
#       branches: [main]

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static site
        run: |
          mkdir -p public
          cp -r landing/. public/
          mkdir -p public/selfcheck && cp -r selfcheck_app/. public/selfcheck/
          mkdir -p public/study && cp -r experiment_app/. public/study/
      - uses: actions/configure-pages@v5
        with:
          enablement: true   # no-op once Pages is enabled in Settings (token cannot create it)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
