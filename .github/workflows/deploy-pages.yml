name: Deploy site to GitHub Pages

# IMPORTANT one-time setup (cannot be done from CI -- the GITHUB_TOKEN is not
# allowed to create a Pages site): repo Settings -> Pages -> Build and deployment
# -> Source = "GitHub Actions". After that, pushes to main (or a manual run via
# the Actions tab) publish the site. Deploys run only from main on purpose:
# Pages has a single live site, so feature branches must not publish to it.

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "selfcheck_app/**"
      - "experiment_app/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static site
        run: |
          mkdir -p public
          cp -r landing/. public/
          mkdir -p public/selfcheck && cp -r selfcheck_app/. public/selfcheck/
          mkdir -p public/study && cp -r experiment_app/. public/study/
      - uses: actions/configure-pages@v5
        with:
          enablement: true   # enable Pages via the API so CI works without manual setup
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
