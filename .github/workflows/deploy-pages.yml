name: Deploy site to GitHub Pages

# One-time setup: repo Settings -> Pages -> Build and deployment -> Source =
# "GitHub Actions". Then every push to the branches below publishes the site.

on:
  push:
    branches: [main, claude/relaxed-dijkstra-cT3q3]
    paths:
      - "landing/**"
      - "selfcheck_app/**"
      - "experiment_app/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static site
        run: |
          mkdir -p public
          cp -r landing/. public/
          mkdir -p public/selfcheck && cp -r selfcheck_app/. public/selfcheck/
          mkdir -p public/study && cp -r experiment_app/. public/study/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
